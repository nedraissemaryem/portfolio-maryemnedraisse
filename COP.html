<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte - M&N Shoes</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<header>
    <img src="logo1HH.png" class="logo">
    <div class="title">
        <h1>M&N</h1>
        <h2>SHOES</h2>
    </div>
</header>

<section class="login-box">
    <h2>Créer un compte</h2>

    <form action="accueil.html" method="POST">
        <label for="nom">Nom</label>
        <input type="text" id="nom" placeholder="Votre nom" required>

        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" placeholder="Votre prénom" required>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Votre email" required>

        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="Mot de passe" required>

        <label for="confirm-password">Confirmer le mot de passe</label>
        <input type="password" id="confirm-password" placeholder="Confirmer le mot de passe" required>

        <button type="submit">Créer mon compte</button>
    </form>

    <p style="margin-top:20px;">
        Vous avez déjà un compte ? <a href="login.html">Se connecter</a>
    </p>
</section>

<footer>
    <p>© 2026 M&N SHOES — Tous droits réservés.</p>
</footer>

</body>
</html>
