<section class="product-detail">

 

    <div class="product-options">
        <label for="size">Choisir la taille :</label>
        <select id="size">
            <option>36</option>
            <option>37</option>
            <option>38</option>
            <option>39</option>

            <option>Noir</option>
            <option>Beige</option>
            <option>Marron</option>
            <option>Blanc</option>
        </select>

        <label for="quantity">Quantité :</label>
        <input type="number" id="quantity" min="1" value="1">

        <div class="buttons">
            <button class="btn-cart">Ajouter au panier 🛒</button>
            <a href="checkout.html" class="btn-order">Commander</a>
        </div>
    </div>
